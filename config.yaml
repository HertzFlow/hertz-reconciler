# Chain Reconciler — daily on-chain reconciliation for Hertz Protocol
# All fields can be overridden via env vars (see internal/config/config.go)

rpc:
  url: https://bsc-testnet-dataseed.bnbchain.org
  request_timeout: 30s
  call_concurrency: 8

scheduler:
  # quick_interval: 高频检查（vault 余额、role 快照），输出到 metrics
  quick_interval: 1h
  # daily_at_utc: 每日报告发送时间 (UTC HH:MM)
  daily_at_utc: "00:00"

notify:
  slack_webhook_env: SLACK_WEBHOOK_URL  # env var name; value loaded at runtime
  enabled: true

metrics:
  port: 8080
  path: /metrics

log:
  level: INFO

